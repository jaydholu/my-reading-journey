<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eb9d44"/>
      <stop offset="100%" stop-color="#dc7f34"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <g transform="translate(64, 38)">
    <!-- Left page -->
    <path d="M-4,0 C-4,0 -38,-4 -40,2 L-40,52 C-38,46 -4,50 -4,50 Z" fill="#fff" opacity="0.95"/>
    <!-- Right page -->
    <path d="M4,0 C4,0 38,-4 40,2 L40,52 C38,46 4,50 4,50 Z" fill="#fff" opacity="0.85"/>
    <!-- Spine -->
    <path d="M-4,0 L-4,50 C-2,52 2,52 4,50 L4,0 C2,-2 -2,-2 -4,0 Z" fill="#f5f0e8"/>

    <!-- Winding journey path on right page -->
    <path d="M10,42 C14,36 22,38 18,30 C14,22 24,20 26,26 C28,32 20,14 28,10 C32,8 34,12 30,16"
          fill="none" stroke="#dc7f34" stroke-width="2" stroke-linecap="round"/>
    <!-- Destination dot -->
    <circle cx="30" cy="16" r="2.5" fill="#dc7f34"/>

    <!-- Text lines on left page -->
    <line x1="-32" y1="14" x2="-12" y2="14" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-32" y1="22" x2="-16" y2="22" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-32" y1="30" x2="-12" y2="30" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-32" y1="38" x2="-20" y2="38" stroke="#d4d4d4" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
